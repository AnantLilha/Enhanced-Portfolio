<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Anant Creation</title>
    <link rel="stylesheet" href="signup.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo-sec">
        <h1 class="logo">Welcome!</h1>
        <p class="subtitle">Create account to enjoy more services..</p>
      </div>
      <div class="name-sec">
        <input type="text" class="first" placeholder="First Name" />
        <input type="text" class="last" placeholder="Last Name" />
      </div>
      <div class="email">
        <input type="email" class="email-holder" placeholder="Enter Email" />
      </div>

      <div class="password-holder">
        <div >
        <input type="password" class="password" placeholder="Enter password" />
      </div>
      <div>
        <input type="password"  class="confirm-pass" placeholder="Confirm Password" />
      </div>

      </div>

      

      <div class="terms">
        <input type="checkbox" />
        <a href="#">I Agree With Terms and Conditions</a>
      </div>

      <div class="sign-up-btn">
        <button class="btn">Get Started</button>
      </div>

      <div class="log-in">
        <p class="log">Already have an account? <a href="login.html">Log in</a></p>
      </div>
    </div>
  </body>
</html>
