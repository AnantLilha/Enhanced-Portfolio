<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3 products</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <span class="logo">My Store</span>
      <input type="text" placeholder="Search for products..." />
      <ul class="navbar">
        <li><a href="#">Home</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
    <div class="welcome">
      <h1>Welcome to My Store</h1>
      <p>Discover our amazing products below!</p>
      <button class="shop-now">Shop Now</button>
    </div>
    <div class="row1">

    <div class="product">
        <div class="product-image"></div>

        <div class="product-name">Mouse</div>

        <div class="product-dis">
            A compact mouse for office and gaming.
        </div>

        <div class="product-price">₹599</div>

        <button class="add-cart">Add to Cart</button>
    </div>

    <div class="product">
        <div class="product-image"></div>

        <div class="product-name">Keyboard</div>

        <div class="product-dis">
            Mechanical keyboard with RGB lighting and silent keys.
        </div>

        <div class="product-price">₹1299</div>

        <button class="add-cart">Add to Cart</button>
    </div>

    <div class="product">
        <div class="product-image"></div>

        <div class="product-name">Monitor</div>

        <div class="product-dis">
            24-inch Full HD monitor with vibrant colors.
        </div>

        <div class="product-price">₹8999</div>

        <button class="add-cart">Add to Cart</button>
    </div>

</div>
    </div>
  </body>
</html>
