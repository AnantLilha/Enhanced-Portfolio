<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Product Card Side-by-side</title>
  </head>
  <body>
    <div class="container">
      <div class="image"><img src="images.jpg" class="product-image" /></div>
      <p class="name">Amkette Mouse</p>
      <span class="price">₹ 700</span>
      <div class="button-container">
        <button class="btn cart">Add to Cart</button>
        <button class="btn buy">Buy Now</button>
      </div>
      <p class="dis">
        A simple compact mouse for office work and silent buttons
      </p>
    </div>
  </body>
</html>
